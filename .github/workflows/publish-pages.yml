name: Publish Bad Orders Dashboard

on:
  workflow_dispatch: {}
  schedule:
    # Cron is UTC. This is Monday 07:15 UTC (~09:15 Malta during summer time).
    - cron: "15 7 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build LIVE dashboard
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [ -z "${DATABRICKS_TOKEN:-}" ]; then
            echo "Missing secret DATABRICKS_TOKEN. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p site
          python build_bad_orders_dashboard.py \
            --country-code mt \
            --year 2026 \
            --output site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

