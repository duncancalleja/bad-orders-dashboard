name: Publish Bad Orders Dashboard

on:
  workflow_dispatch: {}
  schedule:
    # Cron is UTC. This is Monday 07:15 UTC (~09:15 Malta during summer time).
    - cron: "15 7 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Guard - refuse live publish from public repo
        if: ${{ vars.PUBLISH_LIVE_DASHBOARD == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VISIBILITY="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}" \
            | python - <<'PY'
          import json, sys
          print(json.load(sys.stdin).get("visibility", "unknown"))
          PY
          )"
          echo "Repository visibility: ${VISIBILITY}"
          if [ "${VISIBILITY}" = "public" ]; then
            echo "Refusing to publish LIVE dashboard from a public repo."
            echo "Make the repo internal/private first, then re-run."
            exit 1
          fi

      - name: Build SAFE public landing page
        if: ${{ vars.PUBLISH_LIVE_DASHBOARD != 'true' }}
        run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Bad Orders Dashboard (Safe)</title>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #ffffff; color: #1a1a1a; }
                header { background: linear-gradient(135deg, #2A9C64 0%, #1e7a4d 100%); color: #fff; padding: 1.4rem 1.6rem; }
                main { max-width: 900px; margin: 0 auto; padding: 1.2rem 1.6rem 2rem; }
                .card { border: 1px solid #e0e6e0; border-radius: 12px; padding: 1rem 1.2rem; background: #fff; }
                code { background: #f5f7f5; padding: .15rem .35rem; border-radius: 6px; }
                ul { margin: .5rem 0 0 1.1rem; }
              </style>
            </head>
            <body>
              <header>
                <h1 style="margin:0;font-size:1.25rem;">Bad Orders Dashboard</h1>
                <div style="opacity:.9;margin-top:.25rem;">Safe public placeholder — no production data is published.</div>
              </header>
              <main>
                <div class="card">
                  <p style="margin:0 0 .75rem;">
                    This repository is currently configured to publish a <b>safe landing page</b> when the repo/Pages site is public.
                    That prevents exposing any order-level or merchant performance data to the internet.
                  </p>
                  <p style="margin:0 0 .75rem;">
                    To publish the real dashboard, first make the repo and Pages visibility internal/private, then:
                  </p>
                  <ul>
                    <li>Set repo variable <code>PUBLISH_LIVE_DASHBOARD=true</code></li>
                    <li>Add repo secret <code>DATABRICKS_TOKEN</code></li>
                  </ul>
                  <p style="margin:.75rem 0 0;">
                    Setup guide: <code>GITHUB-HOSTING.md</code>
                  </p>
                </div>
              </main>
            </body>
          </html>
          HTML

      - name: Build LIVE dashboard (requires private/internal hosting)
        if: ${{ vars.PUBLISH_LIVE_DASHBOARD == 'true' }}
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          mkdir -p site
          python build_bad_orders_dashboard.py \
            --country-code mt \
            --year 2026 \
            --output site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

